name: Account Deletion Worker

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  account-deletion-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Process due deletions and send queued emails
        run: node scripts/account-deletion-worker.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ACCOUNT_EMAIL_FROM: ${{ secrets.ACCOUNT_EMAIL_FROM }}
          ACCOUNT_EMAIL_REPLY_TO: ${{ secrets.ACCOUNT_EMAIL_REPLY_TO }}
          ACCOUNT_APP_URL: https://sierlia.github.io/testing3/#/settings/account
