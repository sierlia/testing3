name: Scrape public defaults

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/scrape-lobbyist-groups.mjs
      - run: node scripts/scrape-cook-pvi.mjs
      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Refresh public simulation defaults
          file_pattern: src/app/data/*.json
